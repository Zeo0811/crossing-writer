<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- rounded top -->
  <rect x="2" y="0" width="12" height="2" fill="#ff6ab0"/>
  <!-- head widen -->
  <rect x="0" y="2" width="16" height="2" fill="#ff6ab0"/>
  <!-- eye row (pink pieces around eye holes) -->
  <rect x="0" y="4" width="4" height="2" fill="#ff6ab0"/>
  <rect x="6" y="4" width="4" height="2" fill="#ff6ab0"/>
  <rect x="12" y="4" width="4" height="2" fill="#ff6ab0"/>
  <!-- main body -->
  <rect x="0" y="6" width="16" height="4" fill="#ff6ab0"/>
  <!-- tentacle roots -->
  <rect x="0" y="10" width="2" height="2" fill="#ff6ab0"/>
  <rect x="4" y="10" width="4" height="2" fill="#ff6ab0"/>
  <rect x="10" y="10" width="2" height="2" fill="#ff6ab0"/>
  <rect x="14" y="10" width="2" height="2" fill="#ff6ab0"/>
  <!-- tentacle tips -->
  <rect x="0" y="12" width="2" height="2" fill="#ff6ab0"/>
  <rect x="6" y="12" width="2" height="2" fill="#ff6ab0"/>
  <rect x="14" y="12" width="2" height="2" fill="#ff6ab0"/>
  <!-- eyes -->
  <rect x="4" y="4" width="2" height="2" fill="#1a1a1a"/>
  <rect x="10" y="4" width="2" height="2" fill="#1a1a1a"/>
</svg>
